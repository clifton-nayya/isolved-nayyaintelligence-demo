<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>isolved &mdash; Benefit Enrollment</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body data-page="benefits-enrollment">

  <main class="main">
    <div class="content">
     <div class="benefits-wrap">
      <div class="page-title">Benefit Enrollment</div>

      <div class="card enrollment-card">
        <div class="enrollment-user">
          <div class="avatar" style="width:28px;height:28px;background:#ddd;color:#333;font-weight:700;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px">JD</div>
          <span>John Doe</span>
        </div>

        <h2>Multiple Enrollments Available</h2>

        <div class="enrollment-illustration">
          <svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0" y="130" width="240" height="30" fill="#eeeef2"/>
            <!-- board -->
            <rect x="50" y="20"  width="140" height="70" fill="#f2f2f6" stroke="#cfcfd6"/>
            <rect x="60" y="30"  width="35" height="25" fill="#dcdce3"/>
            <rect x="102" y="30" width="35" height="25" fill="#dcdce3"/>
            <rect x="144" y="30" width="35" height="25" fill="#dcdce3"/>
            <rect x="60" y="62"  width="35" height="20" fill="#c9c9d1"/>
            <rect x="102" y="62" width="35" height="20" fill="#c9c9d1"/>
            <rect x="144" y="62" width="35" height="20" fill="#c9c9d1"/>
            <!-- person -->
            <circle cx="120" cy="105" r="7" fill="#bfbfc8"/>
            <rect x="112" y="112" width="16" height="22" rx="3" fill="#ec4899"/>
            <rect x="108" y="134" width="7"  height="16" fill="#4b4b55"/>
            <rect x="125" y="134" width="7"  height="16" fill="#4b4b55"/>
            <!-- desk -->
            <rect x="155" y="115" width="55" height="8" fill="#d9d9e0"/>
            <rect x="160" y="123" width="4"  height="20" fill="#b5b5bd"/>
            <rect x="200" y="123" width="4"  height="20" fill="#b5b5bd"/>
          </svg>
        </div>

        <div class="enrollment-subtitle">You have more than one enrollment period available. Select one to get started.</div>

        <div class="enrollment-tabs">
          <button class="active">Open Enrollment 2026</button>
          <button>OE April 26</button>
          <button>Enrollment 2026</button>
        </div>

        <div class="enrollment-row">
          <div class="days-left">
            <div class="n">8</div>
            <div class="t">DAYS<br>LEFT</div>
          </div>
          <div class="enrollment-info">
            <div class="title">
              Open Enrollment 2026
              <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="4,12 10,18 20,6"/></svg>
            </div>
            <div class="desc">Your Open Enrollment 2026 enrollment is in progress. You can make changes through April 30, 2026.</div>
          </div>
          <button class="btn-primary">CONTINUE</button>
        </div>
      </div>
     </div>
    </div>

    <div class="footer">
      <span class="logo-mini"><span class="i">i</span>solved</span> &copy;2026
    </div>
  </main>

  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/chat-script.js"></script>
  <script src="../assets/js/chat.js"></script>
</body>
</html>
